<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏选择</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#000; color:#f0e6d2; font-family:'STKaiti','KaiTi','Microsoft YaHei',serif; }
  body { display:flex; align-items:center; justify-content:center; padding:20px; }
  .container { max-width:880px; width:100%; text-align:center; }
  h1 { font-size:36px; color:#ffcc66; letter-spacing:8px; margin-bottom:8px; text-shadow:0 0 20px #ff8800; }
  .sub { color:#806040; letter-spacing:6px; font-size:13px; margin-bottom:30px; }
  .games { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:18px; }
  .game-card { padding:24px; border-radius:10px; cursor:pointer; transition:all .25s; text-decoration:none; display:block; }
  .game-card.zhenhuan { background:linear-gradient(180deg,#2a1810,#1a0e08); border:2px solid #80502a; }
  .game-card.zhenhuan:hover { border-color:#ffcc66; transform:translateY(-4px); box-shadow:0 8px 24px rgba(255,170,0,0.3); }
  .game-card.chen { background:linear-gradient(180deg,#1a0808,#080404); border:2px solid #602020; }
  .game-card.chen:hover { border-color:#ff2020; transform:translateY(-4px); box-shadow:0 8px 24px rgba(255,0,0,0.4); }
  .game-card .ic { font-size:54px; margin-bottom:10px; }
  .game-card .t { font-size:24px; letter-spacing:6px; margin-bottom:6px; }
  .game-card.zhenhuan .t { color:#ffcc66; }
  .game-card.chen .t { color:#ff4040; text-shadow:0 0 12px #ff0000; }
  .game-card .d { font-size:14px; color:#a08060; line-height:1.7; margin-top:8px; }
  .game-card .tag { display:inline-block; padding:2px 10px; border-radius:3px; font-size:11px; margin-top:8px; letter-spacing:2px; }
  .game-card.zhenhuan .tag { background:rgba(255,170,0,0.15); color:#ffaa44; border:1px solid #80502a; }
  .game-card.chen .tag { background:rgba(255,0,0,0.15); color:#ff4040; border:1px solid #602020; }
  .footer { margin-top:30px; color:#604030; font-size:12px; letter-spacing:3px; }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 游戏大厅</h1>
  <div class="sub">选 择 一 款 开 始 游 玩</div>
  <div class="games">
    <a class="game-card zhenhuan" href="zhenhuan.html">
      <div class="ic">🎭</div>
      <div class="t">甄嬛传</div>
      <div class="d">多重结局文字游戏<br>宫廷权谋·三种模式·20位角色<br>30+种结局·古风背景音乐</div>
      <div class="tag">文字剧情 · 古风</div>
    </a>
    <a class="game-card chen" href="chen-house.html">
      <div class="ic">🏚</div>
      <div class="t">陳家老宅</div>
      <div class="d">夜访诡事·解谜推理恐怖<br>1925年江南血案调查<br>10场景·5+结局·恐怖音乐</div>
      <div class="tag">恐怖解谜 · 惊悚</div>
    </a>
  </div>
  <div class="footer">⚠ 《陈家老宅》含恐怖元素与跳吓画面，请谨慎游玩</div>
</div>
</body>
</html>
