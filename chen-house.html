<style>

<body>
<div id="app">
  <!-- 标题屏 -->

      二十年前雨夜，陈家满门三十八口离奇惨死<br>

<script>
/* =========================================================
   陈家老宅·夜访诡事
   ========================================================= */

// ---------- 恐怖音乐引擎 ----------
class HorrorMusic {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.playing = false;
    this.mood = 'calm';
    this.timers = [];
    this.sources = [];
  }
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.25;
    this.master.connect(this.ctx.destination);
  }
  // 低频持续音（drone）- 营造压迫感
  startDrone(freq, vol=0.15) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    const g = this.ctx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 2);
    // 添加LFO让音色颤动
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 0.3;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.connect(filter);
    filter.connect(g);
    g.connect(this.master);
    osc.start();
    lfo.start();
    this.sources.push(osc, lfo);
  }
  // 心跳声
  heartbeat() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const beat = (time) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 60;
      osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.5, time + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      osc.connect(g);
      g.connect(this.master);
      osc.start(time);
      osc.stop(time + 0.2);
    };
    beat(t);
    beat(t + 0.25);
  }
  // 尖啸（不和谐高频）
  screech() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const freqs = [2000, 2350, 2780, 3100];
    freqs.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      osc.frequency.linearRampToValueAtTime(f * 1.2, t + 0.5);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.05);
      g.gain.linearRampToValueAtTime(0, t + 0.6);
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1500;
      osc.connect(filter);
      filter.connect(g);
      g.connect(this.master);
      osc.start(t);
      osc.stop(t + 0.7);
    });
  }
  // 雨声（白噪声滤波）
  rain() {
    if (!this.ctx) return;
    const bufferSize = 2 * this.ctx.sampleRate;
    const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1000;
    filter.Q.value = 0.5;
    const g = this.ctx.createGain();
    g.gain.value = 0.08;
    noise.connect(filter);
    filter.connect(g);
    g.connect(this.master);
    noise.start();
    this.sources.push(noise);
  }
  // 钟声（事件触发）
  bell(freq=440) {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2);
    osc.connect(g);
    g.connect(this.master);
    osc.start(t);
    osc.stop(t + 2);
  }
  start() {
    this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.playing = true;
    this.startMood('calm');
  }
  stop() {
    this.playing = false;
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    this.sources.forEach(s => { try { s.stop(); } catch(e){} });
    this.sources = [];
    if (this.master) this.master.gain.value = 0;
  }
  setMood(mood) {
    if (this.mood === mood || !this.playing) return;
    this.stopSources();
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    this.startMood(mood);
  }
  stopSources() {
    this.sources.forEach(s => { try { s.stop(); } catch(e){} });
    this.sources = [];
    if (this.master) this.master.gain.value = 0.25;
  }
  startMood(mood) {
    this.mood = mood;
    if (mood === 'calm') {
      this.startDrone(55, 0.10);
      this.rain();
      this.timers.push(setInterval(() => this.heartbeat(), 2400));
    } else if (mood === 'tense') {
      this.startDrone(45, 0.18);
      this.startDrone(73, 0.06);
      this.rain();
      this.timers.push(setInterval(() => this.heartbeat(), 1400));
      this.timers.push(setInterval(() => { if (Math.random() < 0.3) this.screech(); }, 8000));
    } else if (mood === 'danger') {
      this.startDrone(38, 0.22);
      this.startDrone(61, 0.10);
      this.timers.push(setInterval(() => this.heartbeat(), 800));
      this.timers.push(setInterval(() => { if (Math.random() < 0.5) this.screech(); }, 4000));
    } else if (mood === 'reveal') {
      this.startDrone(110, 0.10);
      this.timers.push(setInterval(() => this.bell(330), 3000));
    } else if (mood === 'death') {
      this.startDrone(30, 0.30);
      this.timers.push(setInterval(() => this.screech(), 1500));
    }
  }
}
const music = new HorrorMusic();

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (music.playing) {
    music.stop();
    btn.classList.remove('playing');
    btn.textContent = '🎵';
  } else {
    music.start();
    btn.classList.add('playing');
    btn.textContent = '🎶';
    showToast('恐怖音乐已开启 🎃');
  }
}

try { unlockedEndings = JSON.parse(localStorage.getItem('chen_endings') || '[]'); } catch(e) {}

// ---------- 物品定义 ----------
const ITEMS = {

// ---------- 场景定义 ----------
const SCENES = {
  gate: {
    title:'第一幕·古宅门前',
    mood:'calm',

// ---------- 工具函数 ----------
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function jumpscare(emoji='💀') {
  const j = document.createElement('div');
  j.className = 'jumpscare';
  j.innerHTML = `<div>${emoji}</div>`;
  document.body.appendChild(j);
  if (music.playing) music.screech();
  setTimeout(() => j.remove(), 800);
}

function hasItem(id) { return state.inventory.includes(id); }
function hasFlag(f) { return state.flags.includes(f); }
function hasClue(c) { return state.cluesFound.includes(c); }

// ---------- 渲染 ----------
function render() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('endingScreen').classList.remove('show');
  document.getElementById('galleryScreen').classList.remove('show');

  if (state.screen === 'title') {
    document.getElementById('titleScreen').style.display = 'flex';
    music.setMood('calm');
  } else if (state.screen === 'game') {
    renderGame();
  } else if (state.screen === 'ending') {
    renderEnding();
  } else if (state.screen === 'gallery') {
    renderGallery();
  }
}

function renderGame() {
  document.getElementById('gameScreen').classList.add('show');
  const scene = SCENES[state.sceneId];
  if (!scene) return;

  // 检查死亡
  if (state.hp <= 0) { state.ending = 'death'; state.screen = 'ending'; render(); return; }
  if (state.san <= 0) { state.ending = 'madness'; state.screen = 'ending'; render(); return; }

  // 音乐切换
  music.setMood(scene.mood || 'calm');

  document.getElementById('sceneTitle').textContent = scene.title;

  // 状态栏
  const sb = document.getElementById('statusBar');
  sb.innerHTML = `
    <div class="stat-item">❤️生命 <div class="stat-bar hp-bar ${state.hp<30?'low':''}"><div style="width:${state.hp}%"></div></div> <span class="val">${state.hp}</span></div>
    <div class="stat-item">🧠理智 <div class="stat-bar san-bar ${state.san<30?'low':''}"><div style="width:${state.san}%"></div></div> <span class="val">${state.san}</span></div>
    <div class="stat-item">🔋电量 <div class="stat-bar bat-bar ${state.battery<20?'low':''}"><div style="width:${state.battery}%"></div></div> <span class="val">${state.battery}</span></div>
    <div class="stat-item">📍线索: <span class="val">${state.cluesFound.length}</span>/7</div>
  `;

  // 叙述
  document.getElementById('narration').innerHTML = scene.desc;

  // 选项
  const cb = document.getElementById('choices');
  if (scene.puzzle) {
    renderPuzzle(scene);
  } else {
    cb.innerHTML = scene.choices.map((c, i) => {
      const locked = c.require && !hasItem(c.require) && !hasFlag(c.require);
      const done = c.once && state.history.includes(state.sceneId + '_' + i);
      return `<button class="choice ${locked||done?'disabled':''}" data-idx="${i}">
        ${c.text}
        ${locked ? `<span class="tag">[${c.msg||'需要'+(ITEMS[c.require]?.name||c.require)}]</span>` : ''}
        ${done ? `<span class="tag">[已查看]</span>` : ''}
      </button>`;
    }).join('');
    cb.querySelectorAll('.choice').forEach(b => {
      b.onclick = () => {
        const i = parseInt(b.dataset.idx);
        const c = scene.choices[i];
        if (c.once) state.history.push(state.sceneId + '_' + i);
        makeChoice(c);
      };
    });
  }

  // 物品栏
  renderInventory();
}

function renderInventory() {
  const inv = document.getElementById('inventory');
  let html = '<span class="inv-label">物品栏：</span>';
  for (let i = 0; i < 8; i++) {
    const itemId = state.inventory[i];
    if (itemId) {
      const item = ITEMS[itemId];
      html += `<div class="inv-slot" title="${item.name} - ${item.desc}">${item.icon}</div>`;
    } else {
      html += `<div class="inv-slot empty">·</div>`;
    }
  }
  inv.innerHTML = html;
  inv.querySelectorAll('.inv-slot:not(.empty)').forEach((s, i) => {
    s.onclick = () => {
      const itemId = state.inventory[i];
      const item = ITEMS[itemId];
      showToast(`<b>${item.name}</b><br>${item.desc}`);
    };
  });
}

function renderPuzzle(scene) {
  const cb = document.getElementById('choices');
  cb.innerHTML = `
    <div style="text-align:center;color:#c08040;margin:10px 0;">输入四位密码：</div>
    <div class="puzzle-input">
      <input maxlength="1" data-idx="0">
      <input maxlength="1" data-idx="1">
      <input maxlength="1" data-idx="2">
      <input maxlength="1" data-idx="3">
    </div>
    <div style="text-align:center;">
      <button class="btn" id="puzzleSubmit">确认</button>
      <button class="btn" id="puzzleBack">放弃</button>
    </div>
  `;
  const inputs = cb.querySelectorAll('.puzzle-input input');
  inputs.forEach((inp, i) => {
    inp.oninput = () => {
      inp.value = inp.value.replace(/[^0-9]/g, '');
      if (inp.value && i < 3) inputs[i+1].focus();
    };
  });
  $('puzzleSubmit').onclick = () => {
    const ans = Array.from(inputs).map(i => i.value).join('');
    if (ans === scene.answer) {
      state.sceneId = scene.onSuccess;
      render();
    } else {
      state.sceneId = scene.onFail;
      render();
    }
  };
  $('puzzleBack').onclick = () => {
    state.sceneId = 'hall';
    render();
  };
}

function makeChoice(c) {
  if (c.require && !hasItem(c.require) && !hasFlag(c.require)) {
    showToast(c.msg || '需要特定物品');
    return;
  }
  if (c.effect) {
    if (c.effect.hp) state.hp = Math.max(0, Math.min(100, state.hp + c.effect.hp));
    if (c.effect.san) state.san = Math.max(0, Math.min(100, state.san + c.effect.san));
    if (c.effect.battery) state.battery = Math.max(0, Math.min(100, state.battery + c.effect.battery));
  }
  if (c.give) {
    const items = Array.isArray(c.give) ? c.give : [c.give];
    items.forEach(it => { if (!state.inventory.includes(it)) state.inventory.push(it); });
    if (c.msg) showToast(c.msg);
  }
  if (c.remove) {
    state.inventory = state.inventory.filter(i => i !== c.remove);
  }
  if (c.clue && !state.cluesFound.includes(c.clue)) {
    state.cluesFound.push(c.clue);
  }
  if (c.flag && !state.flags.includes(c.flag)) {
    state.flags.push(c.flag);
  }
  // 随机跳吓
  if (Math.random() < 0.15 && state.san < 70) {
    jumpscare(['💀','👻','🕷','🩸','👁'][Math.floor(Math.random()*5)]);
  }
  state.sceneId = c.next;
  render();
}

function renderEnding() {
  document.getElementById('endingScreen').classList.add('show');
  const e = ENDINGS[state.ending] || ENDINGS.no_truth;
  if (!unlockedEndings.includes(state.ending)) {
    unlockedEndings.push(state.ending);
    localStorage.setItem('chen_endings', JSON.stringify(unlockedEndings));
  }
  music.setMood(e.name.includes('真相') ? 'reveal' : 'death');
  document.getElementById('endingScreen').innerHTML = `
    <div class="ending-title">${e.name}</div>
    <div class="ending-desc">${e.desc}</div>
    <div class="ending-stats">
      <div class="row"><span>最终生命:</span> <span>${state.hp}/100</span></div>
      <div class="row"><span>最终理智:</span> <span>${state.san}/100</span></div>
      <div class="row"><span>收集线索:</span> <span>${state.cluesFound.length}/7</span></div>
      <div class="row"><span>已走访场景:</span> <span>${state.visitedScenes.length}</span></div>
      <div class="row"><span>结局评级:</span> <span>${e.rating}</span></div>
      <div class="row"><span>已解锁结局:</span> <span>${unlockedEndings.length}/${Object.keys(ENDINGS).length}</span></div>
    </div>
    <div>
      <button class="btn" id="restartBtn">再次踏入古宅</button>
      <button class="btn" id="menuBtn">返回主菜单</button>
    </div>
  `;
  $('restartBtn').onclick = () => { resetGame(); state.screen='game'; render(); };
  $('menuBtn').onclick = () => { state.screen='title'; render(); };
}

function renderGallery() {
  document.getElementById('galleryScreen').classList.add('show');
  const all = Object.keys(ENDINGS);
  document.getElementById('galleryScreen').innerHTML = `
    <h2 style="text-align:center;">已解锁结局 ${unlockedEndings.length}/${all.length}</h2>
    <div class="gal-grid">
      ${all.map(id => {
        const e = ENDINGS[id];
        const unlocked = unlockedEndings.includes(id);
        return `<div class="gal-card ${unlocked?'unlocked':'locked'}">
          <div class="t">${unlocked ? e.name : '？？？（未解锁）'}</div>
          <div class="d">${unlocked ? e.desc.substring(0, 100) + '...' : '完成游戏以解锁此结局'}</div>
          <div class="d" style="color:#a04020;margin-top:6px;">${unlocked ? e.rating : ''}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;margin-top:14px;">
      <button class="btn" id="backBtn">返回</button>
    </div>
  `;
  $('backBtn').onclick = () => { state.screen='title'; render(); };
}

function resetGame() {
  state.sceneId = 'gate';
  state.hp = 100;
  state.san = 100;
  state.battery = 80;
  state.inventory = [];
  state.flags = [];
  state.cluesFound = [];
  state.visitedScenes = [];
  state.ending = null;
  state.history = [];
}

// ---------- 标题屏按钮 ----------
document.querySelectorAll('#titleScreen .menu-btn').forEach(b => {
  b.onclick = () => {
    const act = b.dataset.act;
    if (act === 'start') {
      resetGame();
      state.screen = 'game';
      render();
    } else if (act === 'gallery') {
      state.screen = 'gallery';
      render();
    } else if (act === 'about') {
      showToast('《陈家老宅·夜访诡事》<br>1925年江南，记者林墨调查陈家血案真相。<br>探索10个场景，收集7条线索，解开密码谜题，触发5+种结局。<br>⚠ 含恐怖元素与跳吓画面，请谨慎游玩。');
    }
  };
});

// 音乐按钮
document.getElementById('musicBtn').onclick = toggleMusic;

// 初始渲染
render();

</script>
