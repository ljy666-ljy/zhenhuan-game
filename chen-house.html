<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陈家老宅·夜访诡事</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#000; color:#b8a888; font-family:'STKaiti','KaiTi','Microsoft YaHei',serif; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; }
  #app { position:relative; width:100%; max-width:960px; height:100vh; max-height:720px; background:#080606; border:1px solid #2a1a10; box-shadow:0 0 60px rgba(80,0,0,0.4); overflow:hidden; }

  /* 通用 */
  h1, h2, h3 { color:#a04020; letter-spacing:6px; text-shadow:0 0 12px rgba(180,40,0,0.6); }
  h1 { font-size:38px; text-align:center; margin:24px 0 8px; animation:flicker 4s infinite; }
  h2 { font-size:22px; margin:14px 0; }
  h3 { font-size:17px; margin:10px 0; color:#c06040; }
  p { line-height:1.95; margin:6px 0; }
  .center { text-align:center; }
  .sub { color:#5a4030; letter-spacing:10px; font-size:13px; text-align:center; margin-bottom:20px; }
  .hidden { display:none !important; }
  @keyframes flicker { 0%,100%{opacity:1} 47%{opacity:1} 48%{opacity:0.4} 49%{opacity:1} 70%{opacity:1} 71%{opacity:0.6} 72%{opacity:1} }

  /* 主屏 */
  #titleScreen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:radial-gradient(ellipse at center, #1a0a05 0%, #000 80%); padding:24px; text-align:center; }
  #titleScreen::before { content:''; position:absolute; inset:0; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence baseFrequency="0.9"/></filter><rect width="200" height="200" filter="url(%23n)" opacity="0.06"/></svg>'); pointer-events:none; }
  .ghost-title { font-size:54px; color:#a02020; text-shadow:0 0 30px #ff0000, 0 0 60px #800000, 2px 2px 4px #000; letter-spacing:12px; margin-bottom:10px; animation:ghostPulse 3s infinite; }
  @keyframes ghostPulse { 0%,100%{text-shadow:0 0 30px #ff0000,0 0 60px #800000,2px 2px 4px #000} 50%{text-shadow:0 0 50px #ff4040,0 0 80px #a00000,2px 2px 4px #000} }
  .ghost-sub { color:#806040; letter-spacing:8px; font-size:14px; margin:8px 0 30px; }
  .menu-btn { display:block; width:240px; padding:12px; background:rgba(40,20,10,0.7); border:1px solid #603020; color:#c0a080; font-family:inherit; font-size:18px; letter-spacing:4px; cursor:pointer; margin:6px auto; transition:all .2s; }
  .menu-btn:hover { background:rgba(80,20,20,0.6); border-color:#a04020; color:#ffa080; transform:translateX(4px); box-shadow:0 0 12px rgba(255,40,0,0.3); }

  /* 游戏屏 */
  #gameScreen { position:absolute; inset:0; display:none; flex-direction:column; padding:16px; }
  #gameScreen.show { display:flex; }
  .scene-title { font-size:20px; color:#a04020; letter-spacing:4px; margin-bottom:8px; padding-bottom:6px; border-bottom:1px dashed #3a2010; }
  .narration { flex:1; overflow-y:auto; padding:14px; background:rgba(15,8,5,0.7); border:1px solid #2a1810; border-radius:4px; line-height:2; color:#a89878; font-size:15px; }
  .narration b { color:#d08060; }
  .narration .clue { color:#c08040; background:rgba(80,40,0,0.2); padding:1px 6px; border-radius:2px; }
  .narration .scare { color:#ff4020; font-weight:bold; animation:shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
  .narration::-webkit-scrollbar { width:6px; }
  .narration::-webkit-scrollbar-track { background:#0a0604; }
  .narration::-webkit-scrollbar-thumb { background:#3a2010; border-radius:3px; }

  /* 选项 */
  .choices { padding:10px 0; }
  .choice { display:block; width:100%; padding:10px 14px; margin:5px 0; background:rgba(30,18,10,0.7); border-left:3px solid #603020; border-top:none; border-right:none; border-bottom:none; color:#a89878; font-family:inherit; font-size:15px; cursor:pointer; text-align:left; transition:all .15s; }
  .choice:hover { background:rgba(80,30,20,0.6); border-left-color:#a04020; color:#d0a080; padding-left:20px; }
  .choice.disabled { opacity:0.4; cursor:not-allowed; }
  .choice .tag { font-size:12px; color:#604030; margin-left:8px; }

  /* 状态栏 */
  .status-bar { display:flex; gap:10px; padding:8px 12px; background:rgba(10,5,3,0.9); border:1px solid #2a1810; border-radius:4px; font-size:13px; flex-wrap:wrap; align-items:center; }
  .stat-item { display:flex; align-items:center; gap:6px; color:#806050; }
  .stat-item .val { color:#c08040; font-weight:bold; }
  .stat-bar { width:60px; height:6px; background:#1a0a05; border-radius:3px; overflow:hidden; border:1px solid #2a1810; }
  .stat-bar > div { height:100%; transition:width .3s; }
  .hp-bar > div { background:linear-gradient(90deg,#a02020,#ff4040); }
  .san-bar > div { background:linear-gradient(90deg,#4040a0,#6080ff); }
  .bat-bar > div { background:linear-gradient(90deg,#a08020,#ffe040); }
  .stat-bar.low > div { animation:dangerPulse 1s infinite; }
  @keyframes dangerPulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.5)} }

  /* 物品栏 */
  .inventory { display:flex; gap:4px; padding:6px 8px; background:rgba(10,5,3,0.7); border:1px solid #2a1810; border-radius:4px; margin-top:6px; flex-wrap:wrap; min-height:36px; align-items:center; }
  .inv-slot { width:32px; height:32px; background:rgba(40,20,10,0.6); border:1px solid #3a2010; border-radius:3px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:all .15s; }
  .inv-slot:hover { border-color:#a04020; background:rgba(80,30,20,0.6); }
  .inv-slot.empty { opacity:0.3; cursor:default; }
  .inv-slot.empty:hover { border-color:#3a2010; background:rgba(40,20,10,0.6); }
  .inv-label { color:#604030; font-size:13px; margin-right:8px; letter-spacing:2px; }

  /* 提示弹窗 */
  .toast { position:fixed; top:24px; left:50%; transform:translateX(-50%); background:rgba(10,5,3,0.95); color:#c08040; padding:10px 22px; border:1px solid #a04020; border-radius:4px; z-index:1000; box-shadow:0 0 20px rgba(160,60,20,0.5); animation:fadeUp .3s; font-size:14px; letter-spacing:2px; }
  @keyframes fadeUp { from { opacity:0; transform:translate(-50%,-10px); } to { opacity:1; transform:translate(-50%,0); } }

  /* 跳吓效果 */
  .jumpscare { position:fixed; inset:0; background:#000; z-index:2000; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .jumpscare img, .jumpscare div { font-size:200px; color:#ff2020; text-shadow:0 0 40px #ff0000; animation:jumpShake .5s; }
  @keyframes jumpShake { 0%{transform:scale(0.5)} 20%{transform:scale(1.3)} 40%{transform:scale(0.9)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }

  /* 结局 */
  #endingScreen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:40px; background:#000; overflow-y:auto; }
  #endingScreen.show { display:flex; }
  .ending-title { font-size:36px; color:#a02020; letter-spacing:10px; margin-bottom:16px; text-shadow:0 0 24px #ff0000; }
  .ending-desc { font-size:16px; color:#a89878; line-height:2.2; max-width:600px; text-indent:2em; margin:14px 0; }
  .ending-stats { background:rgba(40,20,10,0.5); border:1px solid #3a2010; border-radius:4px; padding:14px; margin:16px 0; font-size:14px; color:#806050; min-width:280px; }
  .ending-stats .row { display:flex; justify-content:space-between; padding:3px 0; }
  .ending-stats .row span { color:#c08040; }

  /* 图鉴 */
  #galleryScreen { position:absolute; inset:0; display:none; flex-direction:column; padding:24px; background:#080606; overflow-y:auto; }
  #galleryScreen.show { display:flex; }
  .gal-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:10px; margin:14px 0; }
  .gal-card { padding:12px; background:rgba(20,10,5,0.6); border:1px solid #3a2010; border-radius:4px; }
  .gal-card.unlocked { border-color:#a04020; background:rgba(60,20,10,0.4); }
  .gal-card.locked { opacity:0.5; }
  .gal-card .t { color:#a02020; font-weight:bold; letter-spacing:2px; margin-bottom:4px; }
  .gal-card.locked .t { color:#3a2010; }
  .gal-card .d { color:#806050; font-size:13px; line-height:1.6; }

  /* 音乐按钮 */
  #musicBtn { position:absolute; top:14px; right:14px; width:38px; height:38px; border-radius:50%; background:rgba(40,20,10,0.85); border:1px solid #a04020; color:#c08040; cursor:pointer; font-size:18px; z-index:999; display:flex; align-items:center; justify-content:center; }
  #musicBtn:hover { background:rgba(80,30,20,0.85); }
  #musicBtn.playing { animation:musicPulse 2s infinite; }
  @keyframes musicPulse { 0%,100%{box-shadow:0 0 10px rgba(160,60,20,0.4)} 50%{box-shadow:0 0 20px rgba(255,40,0,0.7)} }

  /* 输入框（密码谜题） */
  .puzzle-input { display:flex; gap:8px; justify-content:center; margin:14px 0; }
  .puzzle-input input { width:50px; height:50px; text-align:center; font-size:22px; background:rgba(20,10,5,0.8); border:1px solid #603020; color:#c08040; font-family:inherit; border-radius:3px; }
  .puzzle-input input:focus { outline:none; border-color:#a04020; box-shadow:0 0 8px rgba(160,60,20,0.5); }

  .btn { padding:8px 20px; background:rgba(60,20,10,0.7); border:1px solid #a04020; color:#c0a080; font-family:inherit; font-size:15px; letter-spacing:3px; cursor:pointer; border-radius:3px; margin:6px; }
  .btn:hover { background:rgba(120,30,20,0.7); color:#ffc080; }

  .scrimg { width:100%; max-width:600px; height:200px; background:linear-gradient(180deg,#1a0a05,#080404); border:1px solid #2a1810; border-radius:4px; margin:10px auto; display:flex; align-items:center; justify-content:center; font-size:80px; color:#402020; }
</style>
</head>
<body>
<div id="app">
  <!-- 标题屏 -->
  <div id="titleScreen">
    <div class="ghost-title">陳家老宅</div>
    <div class="ghost-sub">夜 訪 詭 事</div>
    <p style="color:#604030;font-size:13px;max-width:560px;line-height:1.9;margin:10px 0 24px;">
      1925年·江南水乡·陈家老宅<br>
      二十年前雨夜，陈家满门三十八口离奇惨死<br>
      官府结案"匪寇劫杀"，民间却传为诅咒<br>
      你是记者林墨，收到匿名信前来调查真相<br>
      <br>
      <span style="color:#cc2020;font-size:15px;"><b>⚠ 高难度恐怖模式已开启</b></span>
      <br>
      <span style="color:#802020;">
      <b>初始生命/理智/电量双减</b> · 手电持续耗电 · 女鬼追击系统 · 理智崩溃机制<br>
      低频次声波 · 跳吓画面 · 高分贝尖啸音效 · 精神污染文字描写<br>
      <b>建议戴耳机 · 心理承受能力弱者谨慎游玩</b></span>
    </p>
    <button class="menu-btn" data-act="start">🔦 踏入古宅</button>
    <button class="menu-btn" data-act="gallery">📜 已解锁结局</button>
    <button class="menu-btn" data-act="about">📖 游戏说明</button>
  </div>

  <!-- 游戏屏 -->
  <div id="gameScreen">
    <div class="scene-title" id="sceneTitle">场景</div>
    <div class="status-bar" id="statusBar"></div>
    <div class="narration" id="narration"></div>
    <div class="choices" id="choices"></div>
    <div class="inventory" id="inventory"></div>
  </div>

  <!-- 结局屏 -->
  <div id="endingScreen"></div>

  <!-- 图鉴屏 -->
  <div id="galleryScreen"></div>

  <!-- 音乐按钮 -->
  <button id="musicBtn" title="背景音乐">🎵</button>
</div>

<script>
/* =========================================================
   陈家老宅·夜访诡事
   ========================================================= */

// ---------- 恐怖音乐引擎 ----------
class HorrorMusic {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.playing = false;
    this.mood = 'calm';
    this.timers = [];
    this.sources = [];
  }
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.25;
    this.master.connect(this.ctx.destination);
  }
  // 低频持续音（drone）- 营造压迫感
  startDrone(freq, vol=0.15) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 200;
    const g = this.ctx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 2);
    // 添加LFO让音色颤动
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 0.3;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.connect(filter);
    filter.connect(g);
    g.connect(this.master);
    osc.start();
    lfo.start();
    this.sources.push(osc, lfo);
  }
  // 心跳声
  heartbeat() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const beat = (time) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 60;
      osc.frequency.exponentialRampToValueAtTime(30, time + 0.1);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.5, time + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      osc.connect(g);
      g.connect(this.master);
      osc.start(time);
      osc.stop(time + 0.2);
    };
    beat(t);
    beat(t + 0.25);
  }
  // 尖啸（不和谐高频）
  screech() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const freqs = [2000, 2350, 2780, 3100];
    freqs.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      osc.frequency.linearRampToValueAtTime(f * 1.2, t + 0.5);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.05);
      g.gain.linearRampToValueAtTime(0, t + 0.6);
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 1500;
      osc.connect(filter);
      filter.connect(g);
      g.connect(this.master);
      osc.start(t);
      osc.stop(t + 0.7);
    });
  }
  // 雨声（白噪声滤波）
  rain() {
    if (!this.ctx) return;
    const bufferSize = 2 * this.ctx.sampleRate;
    const noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1000;
    filter.Q.value = 0.5;
    const g = this.ctx.createGain();
    g.gain.value = 0.08;
    noise.connect(filter);
    filter.connect(g);
    g.connect(this.master);
    noise.start();
    this.sources.push(noise);
  }
  // 钟声（事件触发）
  bell(freq=440) {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2);
    osc.connect(g);
    g.connect(this.master);
    osc.start(t);
    osc.stop(t + 2);
  }
  // 次声波（18Hz，人耳听不到但引起不安/恐惧）
  infrasound() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 18;
    const g = this.ctx.createGain();
    g.gain.value = 0.4;
    osc.connect(g);
    g.connect(this.master);
    osc.start();
    this.sources.push(osc);
  }
  // 耳语声（白噪声+共振峰滤波，模拟人声但听不清）
  whisper() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const bufferSize = 1.5 * this.ctx.sampleRate;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    // 多个共振峰滤波器模拟人声
    const formant1 = this.ctx.createBiquadFilter();
    formant1.type = 'bandpass';
    formant1.frequency.value = 400;
    formant1.Q.value = 8;
    const formant2 = this.ctx.createBiquadFilter();
    formant2.type = 'bandpass';
    formant2.frequency.value = 1200;
    formant2.Q.value = 10;
    const formant3 = this.ctx.createBiquadFilter();
    formant3.type = 'bandpass';
    formant3.frequency.value = 2200;
    formant3.Q.value = 12;
    const merger = this.ctx.createGain();
    merger.gain.value = 0.5;
    noise.connect(formant1); formant1.connect(merger);
    noise.connect(formant2); formant2.connect(merger);
    noise.connect(formant3); formant3.connect(merger);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.12, t + 0.3);
    g.gain.linearRampToValueAtTime(0.08, t + 0.8);
    g.gain.linearRampToValueAtTime(0, t + 1.5);
    // LFO让音量起伏，像在说话
    const lfo = this.ctx.createOscillator();
    lfo.frequency.value = 5;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 0.06;
    lfo.connect(lfoGain);
    lfoGain.connect(g.gain);
    merger.connect(g);
    g.connect(this.master);
    noise.start(t);
    lfo.start(t);
    noise.stop(t + 1.6);
    lfo.stop(t + 1.6);
  }
  // 呼吸声（低频脉冲+气流噪声）
  breath() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    // 吸气（高频噪声短促）
    const inhaleBuf = this.ctx.createBuffer(1, 0.5 * this.ctx.sampleRate, this.ctx.sampleRate);
    const inhaleData = inhaleBuf.getChannelData(0);
    for (let i = 0; i < inhaleData.length; i++) inhaleData[i] = (Math.random() * 2 - 1) * (1 - i/inhaleData.length);
    const inhale = this.ctx.createBufferSource();
    inhale.buffer = inhaleBuf;
    const inhaleFilter = this.ctx.createBiquadFilter();
    inhaleFilter.type = 'bandpass';
    inhaleFilter.frequency.value = 800;
    const inhaleG = this.ctx.createGain();
    inhaleG.gain.setValueAtTime(0, t);
    inhaleG.gain.linearRampToValueAtTime(0.15, t + 0.1);
    inhaleG.gain.linearRampToValueAtTime(0, t + 0.4);
    inhale.connect(inhaleFilter); inhaleFilter.connect(inhaleG); inhaleG.connect(this.master);
    inhale.start(t);
    inhale.stop(t + 0.5);
    // 呼气（延迟0.5秒）
    const exhaleBuf = this.ctx.createBuffer(1, 0.8 * this.ctx.sampleRate, this.ctx.sampleRate);
    const exhaleData = exhaleBuf.getChannelData(0);
    for (let i = 0; i < exhaleData.length; i++) exhaleData[i] = (Math.random() * 2 - 1);
    const exhale = this.ctx.createBufferSource();
    exhale.buffer = exhaleBuf;
    const exhaleFilter = this.ctx.createBiquadFilter();
    exhaleFilter.type = 'bandpass';
    exhaleFilter.frequency.value = 500;
    const exhaleG = this.ctx.createGain();
    exhaleG.gain.setValueAtTime(0, t + 0.5);
    exhaleG.gain.linearRampToValueAtTime(0.12, t + 0.7);
    exhaleG.gain.linearRampToValueAtTime(0, t + 1.3);
    exhale.connect(exhaleFilter); exhaleFilter.connect(exhaleG); exhaleG.connect(this.master);
    exhale.start(t + 0.5);
    exhale.stop(t + 1.4);
  }
  // 不和谐钢琴音（多个相近半音同时响）
  dissonantPiano() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    // 三全音（魔鬼音程）+ 半音
    const freqs = [130.81, 138.59, 185.00, 196.00]; // C3, C#3, F#3, G3
    freqs.forEach(f => {
      const osc = this.ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = f;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.10, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 3);
      osc.connect(g);
      g.connect(this.master);
      osc.start(t);
      osc.stop(t + 3.1);
    });
  }
  // 弦乐滑音（像指甲刮玻璃，刺耳）
  glassScrape() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(3000, t);
    osc.frequency.exponentialRampToValueAtTime(6000, t + 0.8);
    osc.frequency.exponentialRampToValueAtTime(1500, t + 1.5);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 4000;
    filter.Q.value = 20;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.10, t + 0.05);
    g.gain.linearRampToValueAtTime(0.05, t + 1.0);
    g.gain.linearRampToValueAtTime(0, t + 1.6);
    osc.connect(filter); filter.connect(g); g.connect(this.master);
    osc.start(t);
    osc.stop(t + 1.7);
  }
  // 突然的巨响（跳吓专用）
  stinger() {
    if (!this.ctx || !this.playing) return;
    const t = this.ctx.currentTime;
    // 极低频爆发
    const osc1 = this.ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(80, t);
    osc1.frequency.exponentialRampToValueAtTime(20, t + 0.5);
    const g1 = this.ctx.createGain();
    g1.gain.setValueAtTime(0.5, t);
    g1.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
    osc1.connect(g1); g1.connect(this.master);
    osc1.start(t); osc1.stop(t + 0.9);
    // 高频金属碰撞
    for (let i = 0; i < 5; i++) {
      const osc = this.ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 2000 + Math.random() * 4000;
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(0.15, t + Math.random() * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + Math.random() * 0.2);
      osc.connect(g); g.connect(this.master);
      osc.start(t); osc.stop(t + 0.5);
    }
  }
  start() {
    this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.playing = true;
    this.startMood('calm');
  }
  stop() {
    this.playing = false;
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    this.sources.forEach(s => { try { s.stop(); } catch(e){} });
    this.sources = [];
    if (this.master) this.master.gain.value = 0;
  }
  setMood(mood) {
    if (this.mood === mood || !this.playing) return;
    this.stopSources();
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    this.startMood(mood);
  }
  stopSources() {
    this.sources.forEach(s => { try { s.stop(); } catch(e){} });
    this.sources = [];
    if (this.master) this.master.gain.value = 0.25;
  }
  startMood(mood) {
    this.mood = mood;
    if (mood === 'calm') {
      // 表面平静，但次声波已经在影响你
      this.infrasound();
      this.startDrone(55, 0.12);
      this.startDrone(82.4, 0.04); // 不和谐五度
      this.rain();
      this.timers.push(setInterval(() => this.heartbeat(), 2400));
      this.timers.push(setInterval(() => { if (Math.random() < 0.15) this.whisper(); }, 12000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.10) this.breath(); }, 15000));
    } else if (mood === 'tense') {
      this.infrasound();
      this.startDrone(45, 0.20);
      this.startDrone(73, 0.08); // 不和谐
      this.startDrone(110, 0.04); // 高八度
      this.rain();
      this.timers.push(setInterval(() => this.heartbeat(), 1400));
      this.timers.push(setInterval(() => { if (Math.random() < 0.35) this.screech(); }, 7000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.25) this.whisper(); }, 8000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.20) this.breath(); }, 9000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.15) this.glassScrape(); }, 11000));
    } else if (mood === 'danger') {
      // 极度危险：所有恐怖元素叠加
      this.infrasound();
      this.startDrone(38, 0.25);
      this.startDrone(61, 0.12); // 不和谐
      this.startDrone(91, 0.06); // 三全音
      this.timers.push(setInterval(() => this.heartbeat(), 700));
      this.timers.push(setInterval(() => { if (Math.random() < 0.5) this.screech(); }, 3500));
      this.timers.push(setInterval(() => { if (Math.random() < 0.4) this.whisper(); }, 5000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.35) this.breath(); }, 4500));
      this.timers.push(setInterval(() => { if (Math.random() < 0.25) this.glassScrape(); }, 6000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.20) this.dissonantPiano(); }, 8000));
    } else if (mood === 'reveal') {
      // 真相揭示：庄严又诡异
      this.startDrone(110, 0.12);
      this.startDrone(164.8, 0.05);
      this.timers.push(setInterval(() => this.bell(330), 3000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.20) this.whisper(); }, 10000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.15) this.dissonantPiano(); }, 12000));
    } else if (mood === 'death') {
      // 死亡：所有恐怖元素达到极致
      this.infrasound();
      this.startDrone(30, 0.35);
      this.startDrone(42, 0.15);
      this.timers.push(setInterval(() => this.screech(), 1200));
      this.timers.push(setInterval(() => this.stinger(), 3000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.6) this.whisper(); }, 2500));
      this.timers.push(setInterval(() => { if (Math.random() < 0.5) this.breath(); }, 2000));
      this.timers.push(setInterval(() => { if (Math.random() < 0.4) this.glassScrape(); }, 4000));
    }
  }
}

// ---------- 工具函数 ----------
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function jumpscare(emoji='💀') {
  const j = document.createElement('div');
  j.className = 'jumpscare';
  j.innerHTML = `<div>${emoji}</div>`;
  document.body.appendChild(j);
  if (music.playing) music.screech();
  setTimeout(() => j.remove(), 800);
}

function hasItem(id) { return state.inventory.includes(id); }
function hasFlag(f) { return state.flags.includes(f); }
function hasClue(c) { return state.cluesFound.includes(c); }

// 快捷取DOM
const $ = (id) => document.getElementById(id);

// ---------- 渲染 ----------
function render() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('endingScreen').classList.remove('show');
  document.getElementById('galleryScreen').classList.remove('show');

  if (state.screen === 'title') {
    document.getElementById('titleScreen').style.display = 'flex';
    music.setMood('calm');
  } else if (state.screen === 'game') {
    renderGame();
  } else if (state.screen === 'ending') {
    renderEnding();
  } else if (state.screen === 'gallery') {
    renderGallery();
  }
}

function renderGame() {
  document.getElementById('gameScreen').classList.add('show');
  const scene = SCENES[state.sceneId];
  if (!scene) return;

  // 检查死亡
  if (state.hp <= 0) { state.ending = 'death'; state.screen = 'ending'; render(); return; }
  if (state.san <= 0) { state.ending = 'madness'; state.screen = 'ending'; render(); return; }

  // 音乐切换
  music.setMood(scene.mood || 'calm');

  document.getElementById('sceneTitle').textContent = scene.title;

  // 状态栏
  const sb = document.getElementById('statusBar');
  sb.innerHTML = `
    <div class="stat-item">❤️生命 <div class="stat-bar hp-bar ${state.hp<30?'low':''}"><div style="width:${state.hp}%"></div></div> <span class="val">${state.hp}</span></div>
    <div class="stat-item">🧠理智 <div class="stat-bar san-bar ${state.san<30?'low':''}"><div style="width:${state.san}%"></div></div> <span class="val">${state.san}</span></div>
    <div class="stat-item">🔋电量 <div class="stat-bar bat-bar ${state.battery<20?'low':''}"><div style="width:${state.battery}%"></div></div> <span class="val">${state.battery}</span></div>
    <div class="stat-item">📍线索: <span class="val">${state.cluesFound.length}</span>/7</div>
    <div class="stat-item">👻仇恨: <span class="val" style="color:${state.ghostAggro>50?'#ff2020':'#c08040'};">${state.ghostAggro}</span></div>
    <div class="stat-item">😱恐惧: <span class="val" style="color:${state.fearLevel>=7?'#ff2020':'#c08040'};">Lv${state.fearLevel}</span></div>
    ${state.ghostChasing ? '<div class="stat-item" style="color:#ff2020;animation:dangerPulse 1s infinite;">⚠ 女鬼追击中！</div>' : ''}
  `;

  // 叙述
  document.getElementById('narration').innerHTML = scene.desc;

  // 选项
  const cb = document.getElementById('choices');
  if (scene.puzzle) {
    renderPuzzle(scene);
  } else {
    cb.innerHTML = scene.choices.map((c, i) => {
      const locked = c.require && !hasItem(c.require) && !hasFlag(c.require);
      const done = c.once && state.history.includes(state.sceneId + '_' + i);
      return `<button class="choice ${locked||done?'disabled':''}" data-idx="${i}">
        ${c.text}
        ${locked ? `<span class="tag">[${c.msg||'需要'+(ITEMS[c.require]?.name||c.require)}]</span>` : ''}
        ${done ? `<span class="tag">[已查看]</span>` : ''}
      </button>`;
    }).join('');
    cb.querySelectorAll('.choice').forEach(b => {
      b.onclick = () => {
        const i = parseInt(b.dataset.idx);
        const c = scene.choices[i];
        if (c.once) state.history.push(state.sceneId + '_' + i);
        makeChoice(c);
      };
    });
  }

  // 物品栏
  renderInventory();
}

function renderInventory() {
  const inv = document.getElementById('inventory');
  let html = '<span class="inv-label">物品栏：</span>';
  for (let i = 0; i < 8; i++) {
    const itemId = state.inventory[i];
    if (itemId) {
      const item = ITEMS[itemId];
      html += `<div class="inv-slot" title="${item.name} - ${item.desc}">${item.icon}</div>`;
    } else {
      html += `<div class="inv-slot empty">·</div>`;
    }
  }
  inv.innerHTML = html;
  inv.querySelectorAll('.inv-slot:not(.empty)').forEach((s, i) => {
    s.onclick = () => {
      const itemId = state.inventory[i];
      const item = ITEMS[itemId];
      showToast(`<b>${item.name}</b><br>${item.desc}`);
    };
  });
}

    <div style="text-align:center;">
      <button class="btn" id="puzzleSubmit">确认</button>
      <button class="btn" id="puzzleBack">放弃</button>
    </div>
  `;
  const inputs = cb.querySelectorAll('.puzzle-input input');
  inputs.forEach((inp, i) => {
    inp.oninput = () => {
      inp.value = inp.value.replace(/[^0-9]/g, '');
      if (inp.value && i < 3) inputs[i+1].focus();
    };
  });
  $('puzzleSubmit').onclick = () => {
    const ans = Array.from(inputs).map(i => i.value).join('');
    if (ans === scene.answer) {
      state.sceneId = scene.onSuccess;
      render();
    } else {
      state.sceneId = scene.onFail;
      render();
    }
  };
  $('puzzleBack').onclick = () => {
    state.sceneId = 'hall';
    render();
  };
}

function makeChoice(c) {
  if (c.require && !hasItem(c.require) && !hasFlag(c.require)) {
    showToast(c.msg || '需要特定物品');
    return;
  }
  // 难度系统：每个动作消耗电量、累积恐惧、累积女鬼仇恨
  state.turnCount++;
  // 手电电量持续消耗（除安全区）
  const safeScenes = ['gate','hall','title'];
  if (!safeScenes.includes(state.sceneId) && state.turnCount % 3 === 0) {
    state.battery = Math.max(0, state.battery - 3);
  }
  // 恐惧等级随理智下降而上升
  state.fearLevel = Math.floor((100 - state.san) / 10);
  // 女鬼仇恨随访问恐怖场景累积
  const dangerScenes = ['well_peek','shrine','cellar','attic','attic_ghost','cellar_bagua'];
  if (dangerScenes.includes(c.next)) {
    state.ghostAggro += 15;
  }
  // 女鬼追击触发：仇恨>50且进入危险场景
  if (state.ghostAggro > 50 && !state.ghostChasing && dangerScenes.includes(c.next) && Math.random() < 0.4) {
    state.ghostChasing = true;
    if (music.playing) music.stinger();
    jumpscare('👹');
    showToast('<b style="color:#ff2020;">女鬼开始追击你！快逃！</b>');
  }
  // 女鬼追击中：每回合15%概率被追上
  if (state.ghostChasing && Math.random() < 0.18) {
    state.hp -= 25;
    state.san -= 20;
    if (music.playing) music.stinger();
    jumpscare('👻');
    showToast('<b style="color:#ff2020;">女鬼追上了你！-25生命 -20理智</b>');
    if (state.hp <= 0) { state.ending = 'death'; state.screen = 'ending'; render(); return; }
    if (state.san <= 0) { state.ending = 'madness'; state.screen = 'ending'; render(); return; }
  }
  // 回到安全区会解除追击
  if (safeScenes.includes(c.next)) {
    state.ghostChasing = false;
    state.ghostAggro = Math.max(0, state.ghostAggro - 10);
  }
  if (c.effect) {
    if (c.effect.hp) state.hp = Math.max(0, Math.min(100, state.hp + c.effect.hp));
    if (c.effect.san) state.san = Math.max(0, Math.min(100, state.san + c.effect.san));
    if (c.effect.battery) state.battery = Math.max(0, Math.min(100, state.battery + c.effect.battery));
  }
  if (c.give) {
    const items = Array.isArray(c.give) ? c.give : [c.give];
    items.forEach(it => { if (!state.inventory.includes(it)) state.inventory.push(it); });
    if (c.msg) showToast(c.msg);
  }
  if (c.remove) {
    state.inventory = state.inventory.filter(i => i !== c.remove);
  }
  if (c.clue && !state.cluesFound.includes(c.clue)) {
    state.cluesFound.push(c.clue);
  }
  if (c.flag && !state.flags.includes(c.flag)) {
    state.flags.push(c.flag);
  }
  // 随机跳吓：恐惧等级越高概率越大
  const jumpChance = 0.10 + state.fearLevel * 0.04;
  if (Math.random() < jumpChance && state.san < 75) {
    const scares = ['💀','👻','🕷','🩸','👁','😰','☠','🪦'];
    jumpscare(scares[Math.floor(Math.random()*scares.length)]);
    state.san = Math.max(0, state.san - 3);
  }
  // 理智过低时随机耳语
  if (state.san < 40 && music.playing && Math.random() < 0.3) {
    music.whisper();
  }
  // 电量耗尽：全黑，理智快速下降
  if (state.battery === 0 && !hasItem('candle') && state.turnCount % 2 === 0) {
    state.san = Math.max(0, state.san - 5);
    showToast('<b style="color:#ff2020;">手电没电了！黑暗中理智流失...</b>');
  }
  state.sceneId = c.next;
  render();
}

function renderEnding() {
  document.getElementById('endingScreen').classList.add('show');
  const e = ENDINGS[state.ending] || ENDINGS.no_truth;
  if (!unlockedEndings.includes(state.ending)) {
    unlockedEndings.push(state.ending);
    localStorage.setItem('chen_endings', JSON.stringify(unlockedEndings));
  }
  music.setMood(e.name.includes('真相') ? 'reveal' : 'death');
  document.getElementById('endingScreen').innerHTML = `
    <div class="ending-title">${e.name}</div>
    <div class="ending-desc">${e.desc}</div>
    <div class="ending-stats">
      <div class="row"><span>最终生命:</span> <span>${state.hp}/100</span></div>
      <div class="row"><span>最终理智:</span> <span>${state.san}/100</span></div>
      <div class="row"><span>收集线索:</span> <span>${state.cluesFound.length}/7</span></div>
      <div class="row"><span>已走访场景:</span> <span>${state.visitedScenes.length}</span></div>
      <div class="row"><span>结局评级:</span> <span>${e.rating}</span></div>
      <div class="row"><span>已解锁结局:</span> <span>${unlockedEndings.length}/${Object.keys(ENDINGS).length}</span></div>
    </div>
    <div>
      <button class="btn" id="restartBtn">再次踏入古宅</button>
      <button class="btn" id="menuBtn">返回主菜单</button>
    </div>
  `;
  $('restartBtn').onclick = () => { resetGame(); state.screen='game'; render(); };
  $('menuBtn').onclick = () => { state.screen='title'; render(); };
}

function renderGallery() {
  document.getElementById('galleryScreen').classList.add('show');
  const all = Object.keys(ENDINGS);
  document.getElementById('galleryScreen').innerHTML = `
    <h2 style="text-align:center;">已解锁结局 ${unlockedEndings.length}/${all.length}</h2>
    <div class="gal-grid">
      ${all.map(id => {
        const e = ENDINGS[id];
        const unlocked = unlockedEndings.includes(id);
        return `<div class="gal-card ${unlocked?'unlocked':'locked'}">
          <div class="t">${unlocked ? e.name : '？？？（未解锁）'}</div>
          <div class="d">${unlocked ? e.desc.substring(0, 100) + '...' : '完成游戏以解锁此结局'}</div>
          <div class="d" style="color:#a04020;margin-top:6px;">${unlocked ? e.rating : ''}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;margin-top:14px;">
      <button class="btn" id="backBtn">返回</button>
    </div>
  `;
  $('backBtn').onclick = () => { state.screen='title'; render(); };
}

function resetGame() {
  state.sceneId = 'gate';
  state.hp = 90;
  state.san = 80;
  state.battery = 60;
  state.inventory = [];
  state.flags = [];
  state.cluesFound = [];
  state.visitedScenes = [];
  state.ending = null;
  state.history = [];
  state.ghostAggro = 0;
  state.fearLevel = 0;
  state.turnCount = 0;
  state.ghostChasing = false;
  state.lastSafeScene = 'gate';
}

// ---------- 标题屏按钮 ----------
document.querySelectorAll('#titleScreen .menu-btn').forEach(b => {
  b.onclick = () => {
    const act = b.dataset.act;
    if (act === 'start') {
      resetGame();
      state.screen = 'game';
      render();
    } else if (act === 'gallery') {
      state.screen = 'gallery';
      render();
    } else if (act === 'about') {
      showToast('《陈家老宅·夜访诡事》<br>1925年江南，记者林墨调查陈家血案真相。<br>探索10个场景，收集7条线索，解开密码谜题，触发5+种结局。<br>⚠ 含恐怖元素与跳吓画面，请谨慎游玩。');
    }
  };
});

// 音乐按钮
document.getElementById('musicBtn').onclick = toggleMusic;

// 初始渲染
render();

</script>
</body>
</html>
